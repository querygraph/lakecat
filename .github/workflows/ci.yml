name: CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default workspace
            command: cargo test --workspace
          - name: sail-local service
            command: cargo test -p lakecat-service --features sail-local
          - name: typesec-local security
            command: cargo test -p lakecat-security --features typesec-local
          - name: typesec-local service
            command: cargo test -p lakecat-service --features typesec-local
          - name: grust-local graph
            command: cargo test -p lakecat-graph --features grust-local
          - name: grust cypher boundary
            command: cargo test -p lakecat-graph --features grust-local grust_cypher_can_query_lakecat_catalog_projection_boundary -- --nocapture
          - name: turso-local store
            command: cargo test -p lakecat-store --features turso-local
          - name: all features workspace
            command: cargo test --workspace --all-features

    steps:
      - name: Checkout LakeCat
        uses: actions/checkout@v4
        with:
          path: lakecat

      - name: Checkout Sail
        uses: actions/checkout@v4
        with:
          repository: lakehq/sail
          path: sail

      - name: Apply LakeCat Sail helper patches
        run: >
          git -C sail
          -c user.name=lakecat-ci
          -c user.email=lakecat-ci@users.noreply.github.com
          am lakecat/ci/sail-patches/*.patch

      - name: Checkout Grust
        uses: actions/checkout@v4
        with:
          repository: querygraph/grust
          ref: codex/cypher-write
          path: grust

      - name: Checkout TypeSec
        uses: actions/checkout@v4
        with:
          repository: querygraph/typesec
          path: typesec

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lakecat

      - name: Check formatting
        working-directory: lakecat
        run: >
          cargo fmt
          -p lakecat-api
          -p lakecat-cli
          -p lakecat-core
          -p lakecat-graph
          -p lakecat-lineage
          -p lakecat-querygraph
          -p lakecat-sail
          -p lakecat-security
          -p lakecat-service
          -p lakecat-store
          -- --check

      - name: Test
        working-directory: lakecat
        run: ${{ matrix.command }}
