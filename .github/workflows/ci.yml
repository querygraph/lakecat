name: CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default workspace
            command: cargo test --workspace
          - name: qglake fixture cli
            command: cargo test -p lakecat-cli --features qglake-fixture qglake_fixture
          - name: sail-local service
            command: cargo test -p lakecat-service --features sail-local
          - name: typesec-local security
            command: cargo test -p lakecat-security --features typesec-local
          - name: typesec-local service
            command: cargo test -p lakecat-service --features typesec-local
          - name: grust-local graph
            command: cargo test -p lakecat-graph --features grust-local
          - name: grust cypher boundary
            command: cargo test -p lakecat-graph --features grust-local grust_cypher_can_query_lakecat_catalog_projection_boundary -- --nocapture
          - name: turso-local store
            command: cargo test -p lakecat-store --features turso-local
          - name: all features workspace
            command: cargo test --workspace --all-features

    steps:
      - name: Checkout LakeCat
        uses: actions/checkout@v4
        with:
          path: lakecat

      # Sail is consumed as a Cargo git dependency on the querygraph/sail `lakecat`
      # branch (see Cargo.toml); Cargo fetches it directly, so there is no Sail
      # checkout or patch-apply step to run here.

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Audit local dependency contract
        working-directory: lakecat
        run: scripts/check-local-dependency-contract.sh

      - name: Audit manual workflow trigger contract
        working-directory: lakecat
        run: scripts/check-workflow-trigger-contract.sh

      - name: Audit release version contract
        working-directory: lakecat
        run: scripts/check-release-version-contract.sh

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lakecat

      - name: Check formatting
        working-directory: lakecat
        run: >
          cargo fmt
          -p lakecat-api
          -p lakecat-cli
          -p lakecat-core
          -p lakecat-graph
          -p lakecat-lineage
          -p lakecat-querygraph
          -p lakecat-sail
          -p lakecat-security
          -p lakecat-service
          -p lakecat-store
          -- --check

      - name: Test
        working-directory: lakecat
        run: ${{ matrix.command }}
