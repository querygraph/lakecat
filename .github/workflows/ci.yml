name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default workspace
            command: cargo test --workspace
          - name: sail-local service
            command: cargo test -p lakecat-service --features sail-local
          - name: typesec-local security
            command: cargo test -p lakecat-security --features typesec-local
          - name: grust-local graph
            command: cargo test -p lakecat-graph --features grust-local
          - name: turso-local store
            command: cargo test -p lakecat-store --features turso-local
          - name: all features workspace
            command: cargo test --workspace --all-features

    steps:
      - name: Checkout LakeCat
        uses: actions/checkout@v4
        with:
          path: lakecat

      - name: Checkout Sail
        uses: actions/checkout@v4
        with:
          repository: lakehq/sail
          path: sail

      - name: Checkout Grust
        uses: actions/checkout@v4
        with:
          repository: querygraph/grust
          ref: codex/cypher-write
          path: grust

      - name: Checkout TypeSec
        uses: actions/checkout@v4
        with:
          repository: querygraph/typesec
          path: typesec

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lakecat

      - name: Check formatting
        working-directory: lakecat
        run: cargo fmt --all -- --check

      - name: Test
        working-directory: lakecat
        run: ${{ matrix.command }}
